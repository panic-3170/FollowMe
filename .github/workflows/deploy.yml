name: Deploy Nuxt site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Pin every action to its latest major that runs on Node 24.
# Older majors (configure-pages@v5, upload-pages-artifact@v3) are stuck on
# Node 20 and trigger the "Node.js 20 actions are deprecated" warning;
# upload-pages-artifact@v3 in particular has been hard-deprecated since
# 2024-11-30 and can cause the build step to exit non-zero.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate
        env:
          NITRO_PRESET: github_pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public
          # v5 默认 exclude 隐藏文件,但 nitro 的 github_pages 预设会生成
          # .nojekyll(以及 .output/public 里其它点开头的元数据),
          # 漏掉这个文件 GitHub Pages 会跑 Jekyll,Jekyll 默认忽略
          # 所有 _ 开头的目录,导致 _nuxt/ 整个消失、JS/CSS 全 404。
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
